---
apiVersion: v1
kind: Service
metadata:
  name: redis-headless
  labels:
    app: redis
spec:
  ports:
    - port: 6379
      name: redis
  clusterIP: None
  selector:
    app: redis
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  labels:
    app: redis
spec:
  ports:
    - port: 6379
      name: redis
  selector:
    app: redis
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
spec:
  serviceName: redis-headless
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
      - name: redis
        image: redis:6.2-alpine
        ports:
        - containerPort: 6379
          name: redis
        resources:
          requests:
            memory: "100Mi"
            cpu: "10m"
          limits:
            memory: "100Mi"
            cpu: "10m"
        command:
        - sh
        - -c
        - |
          if [ "$(hostname)" == "redis-0" ]; then
            redis-server /etc/redis/redis.conf
          else
            redis-server /etc/redis/redis.conf --slaveof redis-0.redis-headless 6379
          fi
        volumeMounts:
        - name: redis-config
          mountPath: /etc/redis/
        - name: redis-data
          mountPath: /data
      - name: data-loader
        image: python:3.9-alpine
        command: ['sh', '-c']
        args:
        - |
          pip install redis
          python -c '
          import json
          import redis
          import socket
          import time
          import sys
          
          def wait_for_redis():
              while True:
                  try:
                      r = redis.Redis(host="localhost", port=6379, password="redispassword")
                      r.ping()
                      return r
                  except (redis.ConnectionError, redis.TimeoutError):
                      print("Waiting for Redis to be ready...")
                      time.sleep(1)
          
          def load_products(redis_client):
              with open("/data/products.json", "r") as f:
                  data = json.load(f)
              
              for product in data["products"]:
                  product_id = product["id"]
                  redis_client.set(product_id, json.dumps(product))
                  print(f"Stored product {product_id}")
          
          def main():
              hostname = socket.gethostname()
              
              # Wait for Redis to be ready
              redis_client = wait_for_redis()
              print("Connect to redis")
              
              # Only load data on master node (redis-0)
              if hostname == "redis-0":
                  print("Loading data on master node")
                  load_products(redis_client)
              else:
                  print("This is a slave node, skipping data loading")
              
              # Keep the container running
              while True:
                  time.sleep(86400)
          
          if __name__ == "__main__":
              main()
          '
          echo "Data loading completed"
        volumeMounts:
        - name: products-data
          mountPath: /data
      volumes:
      - name: redis-config
        configMap:
          name: redis-config
      - name: products-data
        configMap:
          name: products-data
      - name: redis-data
        emptyDir: {}